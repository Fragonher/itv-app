<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0f766e">
    <title>Control ITV</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="assets/icon-32.png" sizes="32x32" type="image/png">
    <link rel="icon" href="assets/icon-192.png" sizes="192x192" type="image/png">
    <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="contenedor">
    <header class="cabecera">
        <div>
            <p class="etiqueta">Panel ITV</p>
            <h1>Control ITV Veh&iacute;culos</h1>
        </div>
        <div class="acciones-cabecera">
            <button type="button" id="btnAbrirFormulario" class="btn primario" onclick="abrirFormulario()">
                <img src="assets/crearvehiculo.png" alt="" class="icono-boton">
                Crear veh&iacute;culo
            </button>
            <button type="button" id="btnCerrarSesion" class="btn fantasma" onclick="cerrarSesion()">Salir</button>
        </div>
    </header>

    <section class="resumen" aria-label="Resumen ITV">
        <article class="tarjeta-resumen filtro-activo" data-filtro="total">
            <span>Total veh&iacute;culos</span>
            <strong id="totalVehiculos">0</strong>
        </article>
        <article class="tarjeta-resumen alerta" data-filtro="caducada">
            <span>ITV caducadas</span>
            <strong id="itvCaducadas">0</strong>
        </article>
        <article class="tarjeta-resumen aviso" data-filtro="proxima">
            <span>ITV pr&oacute;ximas</span>
            <strong id="itvProximas">0</strong>
        </article>
        <article class="tarjeta-resumen ok" data-filtro="correcta">
            <span>ITV correctas</span>
            <strong id="itvCorrectas">0</strong>
        </article>
    </section>

    <section class="panel oculto" id="panelCrearVehiculo">
        <h2>Nuevo veh&iacute;culo</h2>
        <form id="formVehiculo" class="formulario">
            <label>
                Matr&iacute;cula
                <input type="text" id="matricula" placeholder="1234 ABC" required>
            </label>
            <label>
                Marca
                <input type="text" id="marca" placeholder="Renault" required>
            </label>
            <label>
                Modelo
                <input type="text" id="modelo" placeholder="Master" required>
            </label>
            <label>
                &Uacute;ltima ITV
                <input type="date" id="fechaUltimaItv" required>
            </label>
            <label>
                Pr&oacute;xima ITV
                <input type="date" id="fechaProximaItv" required>
            </label>
            <label class="campo-archivo">
                Documento ITV
                <input type="file" id="documentoItv" accept="application/pdf,image/*">
                <span class="btn archivo">
                    <img src="assets/fotos.png" alt="" class="icono-boton">
                    Guardar ITV
                </span>
                <span id="nombreDocumentoItv" class="texto-suave nombre-archivo">Ning&uacute;n archivo seleccionado</span>
            </label>
            <label class="campo-archivo">
                Foto veh&iacute;culo
                <input type="file" id="fotoVehiculo" accept="image/*">
                <span class="btn archivo secundario-archivo">
                    <img src="assets/fotos.png" alt="" class="icono-boton">
                    Subir foto
                </span>
                <span id="nombreFotoVehiculo" class="texto-suave nombre-archivo">Ninguna foto seleccionada</span>
            </label>
            <div class="acciones-formulario">
                <button type="submit" id="btnGuardar" class="btn primario">
                    <img src="assets/crearvehiculo.png" alt="" class="icono-boton">
                    Crear veh&iacute;culo
                </button>
                <button type="button" id="btnCancelar" class="btn secundario">Cancelar</button>
            </div>
        </form>
        <p id="mensajeFormulario" class="mensaje-formulario oculto"></p>
    </section>

    <section class="panel">
        <div class="encabezado-listado">
            <h2>Veh&iacute;culos</h2>
            <div class="barra-busqueda">
                <input type="search" id="buscarMatricula" placeholder="Buscar por matr&iacute;cula">
                <button type="button" id="btnBuscarMatricula" class="btn buscar">
                    <img src="assets/buscar.png" alt="" class="icono-boton">
                    Buscar
                </button>
                <button type="button" id="btnLimpiarBusqueda" class="btn fantasma oculto">Limpiar</button>
            </div>
        </div>

        <div id="tarjetasVehiculos" class="tarjetas-vehiculos"></div>
    </section>
</main>

<div id="modalDetalleVehiculo" class="modal oculto" role="dialog" aria-modal="true" aria-labelledby="tituloDetalleVehiculo">
    <div class="modal-contenido modal-detalle">
        <div class="detalle-cabecera">
            <div>
                <p class="etiqueta">Detalle veh&iacute;culo</p>
                <h2 id="tituloDetalleVehiculo"></h2>
                <p id="subtituloDetalleVehiculo" class="texto-suave"></p>
            </div>
            <button type="button" id="btnCerrarDetalleVehiculo" class="btn fantasma">Cerrar</button>
        </div>
        <div id="contenidoDetalleVehiculo"></div>
    </div>
</div>

<div id="modalPasarItv" class="modal oculto" role="dialog" aria-modal="true" aria-labelledby="tituloPasarItv">
    <div class="modal-contenido">
        <h2 id="tituloPasarItv">Pasar ITV</h2>
        <p id="matriculaPasarItv" class="texto-suave"></p>
        <form id="formPasarItv" class="formulario-modal">
            <label>
                Fecha ITV
                <input type="date" id="fechaPasarItv" required>
            </label>
            <label>
                Pr&oacute;xima ITV
                <input type="date" id="fechaSiguienteItv" required>
            </label>
            <div class="acciones-modal">
                <button type="submit" class="btn confirmar-itv">
                    <img src="assets/itv.png" alt="" class="icono-boton">
                    Pasar ITV
                </button>
                <button type="button" id="btnCerrarPasarItv" class="btn cancelar-modal">Cancelar</button>
            </div>
        </form>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
